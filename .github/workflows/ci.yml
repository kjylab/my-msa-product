name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'

permissions:
  id-token: write
  contents: read

jobs:
  test-and-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - uses: gradle/actions/setup-gradle@v4

      - name: Build & Test
        run: ./gradlew build --no-daemon

      - name: SonarCloud scan
        if: vars.SONARCLOUD_ENABLED == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./gradlew sonar --no-daemon

  build-and-push:
    needs: test-and-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - uses: gradle/actions/setup-gradle@v4

      - name: Build JAR
        run: ./gradlew :product-service:bootJar -x test --no-daemon

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          file: ./Containerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/my-msa-product-service:${{ github.sha }}

  update-manifest:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: kjylab/my-msa-manifest-values
          token: ${{ secrets.GH_PAT }}

      - name: Update Image Tag
        run: |
          cd product-service
          sed -i "s|tag:.*|tag: ${{ github.sha }}|g" values-release.yaml

      - name: Commit and Push
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add .
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Update image tag to ${{ github.sha }}"
          git pull --rebase
          git push origin main

  trigger-e2e:
    needs: update-manifest
    runs-on: ubuntu-latest
    steps:
      - name: Trigger E2E tests
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.GH_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/kjylab/my-msa-user-api-gateway/dispatches \
            -d '{"event_type":"run-e2e","client_payload":{"service":"product-service"}}'
