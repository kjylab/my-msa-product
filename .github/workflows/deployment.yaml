name: CI Workflow

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  packages: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - uses: gradle/actions/setup-gradle@v4

      - name: Build JAR
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}
        run: ./gradlew :product-service:bootJar -x test --no-daemon

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          file: ./Containerfile
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/my-msa-product-service:${{ github.sha }}

  update-manifest:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Manifest Repo
        uses: actions/checkout@v4
        with:
          repository: 'kjylab/my-msa-manifest-values'
          token: ${{ secrets.GH_PAT }}

      - name: Update Image Tag
        run: |
          cd product-service
          sed -i "s|tag:.*|tag: ${{ github.sha }}|g" values-release.yaml

      - name: Commit and Push
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add .
          git commit -m "Update image tag to ${{ github.sha }}"
          git push origin main
